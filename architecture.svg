<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
    <!-- Definitions for Styles and Effects -->
    <defs>
        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.05" />
        </linearGradient>
        <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.05" />
        </linearGradient>
        <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:0.05" />
        </linearGradient>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1000" height="600" fill="#0f172a" rx="16"/>

    <!-- Title & Subtitle -->
    <text x="500" y="50" fill="#f8fafc" font-family="Inter, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">Universal Decision Companion</text>
    <text x="500" y="80" fill="#94a3b8" font-family="Inter, sans-serif" font-size="16" text-anchor="middle">Deep Architecture: Multi-Criteria Decision Analysis (MCDA) Lifecycle</text>

    <!-- 1. Frontend Layer -->
    <rect x="50" y="240" width="220" height="120" rx="12" fill="url(#blueGrad)" stroke="#3b82f6" stroke-width="2" />
    <text x="160" y="280" fill="#f8fafc" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">React Dashboard</text>
    <text x="160" y="305" fill="#94a3b8" font-family="sans-serif" font-size="13" text-anchor="middle">Dynamic UI &amp; Framer Motion</text>
    <text x="160" y="325" fill="#60a5fa" font-family="sans-serif" font-size="12" font-style="italic" text-anchor="middle">"The Perspective Layer"</text>

    <!-- Arrow to API -->
    <path d="M 270 300 L 330 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
    <text x="300" y="290" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">JSON Context</text>

    <!-- 2. FastAPI Gateway -->
    <rect x="340" y="240" width="180" height="120" rx="12" fill="url(#emeraldGrad)" stroke="#10b981" stroke-width="2" />
    <text x="430" y="285" fill="#f8fafc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">API Gateway</text>
    <text x="430" y="310" fill="#94a3b8" font-family="sans-serif" font-size="13" text-anchor="middle">FastAPI Endpoints</text>
    <text x="430" y="330" fill="#34d399" font-family="sans-serif" font-size="12" font-style="italic" text-anchor="middle">Validation &amp; Routing</text>

    <!-- Bounding Box for MCDA Engine -->
    <rect x="560" y="110" width="400" height="420" rx="20" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="10,5" />
    <text x="760" y="550" fill="#64748b" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">MCDA Deterministic Engine</text>

    <!-- 3. Engine Tiers -->
    
    <!-- T1: Normalization -->
    <rect x="590" y="140" width="340" height="70" rx="10" fill="url(#purpleGrad)" stroke="#8b5cf6" stroke-width="2" />
    <text x="760" y="170" fill="#f8fafc" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">T1: Normalization Tier</text>
    <text x="760" y="190" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Min-Max Scaling | Benefit vs. Cost Differentiation</text>

    <!-- T2: Synthesis -->
    <rect x="590" y="235" width="340" height="70" rx="10" fill="url(#purpleGrad)" stroke="#8b5cf6" stroke-width="2" />
    <text x="760" y="265" fill="#f8fafc" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">T2: Synthesis Tier (WSM)</text>
    <text x="760" y="285" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Weighted Sum Model Calculation (Σ w_i * x_norm)</text>

    <!-- T3: Explanation -->
    <rect x="590" y="330" width="340" height="70" rx="10" fill="url(#purpleGrad)" stroke="#c084fc" stroke-width="2" />
    <text x="760" y="360" fill="#f8fafc" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">T3: Explanation Tier</text>
    <text x="760" y="380" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Deficit Analysis | Why-Not-Winner Logic</text>

    <!-- T4: Meta-Analysis -->
    <rect x="590" y="425" width="340" height="70" rx="10" fill="url(#purpleGrad)" stroke="#f59e0b" stroke-width="2" />
    <text x="760" y="455" fill="#f8fafc" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">T4: Meta-Analysis Tier</text>
    <text x="760" y="475" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">Sensitivity Testing (±10%) | Confidence Protocol</text>

    <!-- Internal Engine Arrows -->
    <path d="M 760 210 L 760 235" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 760 305 L 760 330" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 760 400 L 760 425" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />

    <!-- Main Entry to Engine -->
    <path d="M 520 300 Q 540 300 590 175" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

    <!-- Conclusion Path -->
    <path d="M 930 460 Q 980 460 980 300 T 520 300" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
    <text x="470" y="510" fill="#10b981" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Rankings + Explanations + Simulation Data</text>

</svg>
