<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
    <!-- Definitions for Styles and Effects -->
    <defs>
        <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.05" />
        </linearGradient>
        <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:0.05" />
        </linearGradient>
        <linearGradient id="engineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
            <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.05" />
        </linearGradient>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1000" height="500" fill="#0f172a" rx="16"/>

    <!-- Title -->
    <text x="500" y="45" fill="#f8fafc" font-family="Inter, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Universal Decision Companion - System Flow</text>

    <!-- UI Dashboard -->
    <rect x="30" y="200" width="160" height="100" rx="12" fill="url(#uiGrad)" stroke="#3b82f6" stroke-width="2" />
    <text x="110" y="245" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">UI Dashboard</text>
    <text x="110" y="265" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">React Frontend</text>

    <!-- UI to API -->
    <path d="M 190 250 L 230 250" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
    <text x="210" y="240" fill="#94a3b8" font-family="sans-serif" font-size="10" height="10" text-anchor="middle">JSON</text>

    <!-- FastAPI Backend -->
    <rect x="240" y="200" width="160" height="100" rx="12" fill="url(#apiGrad)" stroke="#10b981" stroke-width="2" />
    <text x="320" y="245" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Gateway</text>
    <text x="320" y="265" fill="#94a3b8" font-family="sans-serif" font-size="12" text-anchor="middle">FastAPI Backend</text>

    <!-- API to Normalization -->
    <path d="M 400 250 L 440 250" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

    <!-- Subgraph: MCDA ENGINE -->
    <rect x="450" y="80" width="380" height="340" rx="20" fill="url(#engineGrad)" stroke="#475569" stroke-width="1.5" stroke-dasharray="8,4" />
    <text x="640" y="105" fill="#8b5cf6" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">MCDA ENGINE CORE</text>

    <!-- Normalization Layer -->
    <rect x="470" y="130" width="150" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    <text x="545" y="155" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Normalization</text>
    <text x="545" y="172" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Min-Max Scaling</text>

    <!-- Scoring Engine -->
    <rect x="660" y="130" width="150" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    <text x="735" y="155" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Scoring Engine</text>
    <text x="735" y="172" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Weighted Sums</text>

    <!-- Normalization to Scoring -->
    <path d="M 620 160 L 660 160" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />

    <!-- Explanation Engine -->
    <rect x="470" y="240" width="150" height="60" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="2" />
    <text x="545" y="265" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Explanation</text>
    <text x="545" y="282" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Deficit Analysis</text>

    <!-- Analysis Engine -->
    <rect x="660" y="240" width="150" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
    <text x="735" y="265" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Analysis Engine</text>
    <text x="735" y="282" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Sensitivity/Stability</text>

    <!-- Scoring to Explanation & Analysis -->
    <path d="M 735 190 L 735 240" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 735 210 Q 545 210 545 240" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />

    <!-- Results Packaging (Dashboard Metrics) -->
    <rect x="560" y="340" width="160" height="60" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" stroke-dasharray="4,2" />
    <text x="640" y="365" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Dashboard Payload</text>
    <text x="640" y="382" fill="#34d399" font-family="sans-serif" font-size="11" text-anchor="middle">Rankings &amp; Meta-Data</text>

    <!-- Explanation/Analysis to Dashboard Metrics -->
    <path d="M 545 300 Q 545 340 560 360" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 735 300 Q 735 340 720 360" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />

    <!-- Dashboard Metrics back to UI -->
    <path d="M 560 370 Q 110 370 110 300" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowhead)" filter="url(#glow)" />
    <text x="335" y="445" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Animated Ranking &amp; Dashboard Update</text>

</svg>
